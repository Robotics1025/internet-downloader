name: Build Windows Installer

# Trigger on every push to main, every version tag (v1.0.0 etc), and via the
# Actions tab "Run workflow" button so you can rebuild on demand without a push.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Cancel an in-flight build when a new push lands on the same branch — there's
# no point waiting for an outdated build to finish.
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 75
    # softprops/action-gh-release needs write access to create + update releases
    # via the workflow's GITHUB_TOKEN.
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # Toolchain setup
      # ─────────────────────────────────────────────────────────────────────

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Rust (stable, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + git + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/shell/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/shell/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install uv (Python package manager)
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install API Python dependencies
        shell: pwsh
        working-directory: apps/api
        run: uv sync

      # ─────────────────────────────────────────────────────────────────────
      # Vendored binaries (yt-dlp.exe + ffmpeg.exe)
      # ─────────────────────────────────────────────────────────────────────
      # These are downloaded fresh every CI run instead of being committed to
      # the repo (we'd hit GitHub's 100 MB file limit). Versions are pinned
      # so reproducibility is preserved across runs.

      - name: Download yt-dlp.exe and ffmpeg.exe
        shell: pwsh
        run: |
          $binDir = "build\pyinstaller\binaries\windows-x86_64"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          $ytdlpVersion = "2026.03.17"
          $ytdlpUrl = "https://github.com/yt-dlp/yt-dlp/releases/download/$ytdlpVersion/yt-dlp.exe"
          Write-Host "Downloading yt-dlp $ytdlpVersion ..."
          Invoke-WebRequest -Uri $ytdlpUrl -OutFile "$binDir\yt-dlp.exe"

          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Write-Host "Downloading ffmpeg essentials ..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extract -Force
          $ffmpegExe = Get-ChildItem -Path ffmpeg-extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item -Path $ffmpegExe.FullName -Destination "$binDir\ffmpeg.exe"
          Remove-Item ffmpeg.zip
          Remove-Item -Recurse -Force ffmpeg-extract

          Write-Host "Vendored binaries:"
          Get-ChildItem $binDir | Select-Object Name, Length

      # ─────────────────────────────────────────────────────────────────────
      # PyInstaller — produces dm-api.exe (~100 MB) with yt-dlp + ffmpeg
      # baked in.
      # ─────────────────────────────────────────────────────────────────────

      - name: Build dm-api.exe via PyInstaller
        shell: pwsh
        working-directory: apps/api
        run: |
          uv run pyinstaller --noconfirm `
            --distpath ..\..\build\pyinstaller\dist `
            --workpath ..\..\build\pyinstaller\build `
            ..\..\build\pyinstaller\dm-api.spec
          Write-Host "dm-api.exe:"
          Get-Item ..\..\build\pyinstaller\dist\dm-api.exe | Select-Object Name, Length

      - name: Stage sidecar binary for Tauri
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps\shell\binaries | Out-Null
          # Tauri's externalBin resolver expects <name>-<rust-target-triple>.exe
          $target = "x86_64-pc-windows-msvc"
          Copy-Item `
            -Path build\pyinstaller\dist\dm-api.exe `
            -Destination "apps\shell\binaries\dm-api-$target.exe"
          Get-ChildItem apps\shell\binaries

      # ─────────────────────────────────────────────────────────────────────
      # React frontend
      # ─────────────────────────────────────────────────────────────────────

      - name: Build React frontend
        working-directory: apps/desktop
        run: |
          npm ci
          npm run build

      # ─────────────────────────────────────────────────────────────────────
      # Tauri — produces both MSI (Windows Installer) and NSIS (.exe) bundles.
      # Both prompt the user for an install location like Cursor / VSCode do.
      # ─────────────────────────────────────────────────────────────────────

      - name: Install Tauri CLI v2
        shell: pwsh
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri bundles (MSI + NSIS)
        working-directory: apps/shell
        shell: pwsh
        # --bundles overrides the "appimage" target in tauri.conf.json so the
        # same config works for both Linux dev builds and this Windows CI run.
        run: cargo tauri build --bundles nsis,msi

      # ─────────────────────────────────────────────────────────────────────
      # Upload artifacts so anyone (you, friends, testers) can download the
      # installers straight from the Actions run UI.
      # ─────────────────────────────────────────────────────────────────────

      - name: Show built bundles
        shell: pwsh
        run: |
          Write-Host "=== MSI ==="
          Get-ChildItem apps\shell\target\release\bundle\msi -Recurse -ErrorAction SilentlyContinue | Select-Object Name, Length
          Write-Host "=== NSIS ==="
          Get-ChildItem apps\shell\target\release\bundle\nsis -Recurse -ErrorAction SilentlyContinue | Select-Object Name, Length

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: DownloadMgr-Windows-Installers
          path: |
            apps/shell/target/release/bundle/msi/*.msi
            apps/shell/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      # ─────────────────────────────────────────────────────────────────────
      # When a version tag is pushed (e.g. `git tag v0.1.1 && git push --tags`)
      # attach the installers to the corresponding GitHub Release so friends
      # can download them from your Releases page instead of from Actions.
      # ─────────────────────────────────────────────────────────────────────

      # On a vX.Y.Z tag: create a proper versioned release (e.g. "v0.1.1").
      - name: Attach installers to versioned Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/shell/target/release/bundle/msi/*.msi
            apps/shell/target/release/bundle/nsis/*.exe
          generate_release_notes: true

      # On every push to main: update a rolling "latest" pre-release so users
      # always have an installable build on the Releases page without you
      # having to remember to tag.
      - name: Update rolling 'latest' pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (from main)
          prerelease: true
          body: |
            Auto-built from the latest commit on `main`
            (${{ github.sha }}).
            For stable versioned releases see the tagged releases below.
          files: |
            apps/shell/target/release/bundle/msi/*.msi
            apps/shell/target/release/bundle/nsis/*.exe
